    fs_schedule_b.enabled = defined("has_rental_income") and has_rental_income
  else:
    fs_short.enabled = False
    fs_long.enabled = False
    fs_schedule_a.enabled = False
    fs_schedule_b.enabled = False

  a_divorce_agreement_Post_interview_instructions.enabled = include_separation_agreement
  a_divorce_agreement_attachment.enabled = include_separation_agreement
