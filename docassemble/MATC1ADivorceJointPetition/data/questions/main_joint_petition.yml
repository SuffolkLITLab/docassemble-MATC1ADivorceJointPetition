  divorcejointpetition_Post_interview_instructions.enabled = True
  divorcejointpetition_attachment.enabled = True
  affidavit_attachment.enabled = True

  if include_financial_statement:
    fs_short.enabled = financial_form_type == "short"
    fs_long.enabled = financial_form_type == "long"
