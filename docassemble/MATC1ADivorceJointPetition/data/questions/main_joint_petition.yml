template: financial_statement_decision_help
subject: |
  How to decide about financial statements
content: |
  You do **not** have to file financial statements with your initial Joint Petition (1A).

  Best practice is to file a signed financial statement for each spouse before your case is scheduled.

  Financial statements are signed under penalty of perjury, so accuracy matters. The court relies on these forms when making decisions. If your circumstances change you must file an updated financial statement accordingly. 

  Under **Supplemental Probate and Family Court Rule 401**, each party in a divorce must file a signed financial statement within **45 days after service of summons**, or sooner if a hearing or pretrial conference is scheduled.
---
id: joint petition interview order
code: |
  nav.set_section("convert_1b_to_1a")
  has_existing_1b_action
  if has_existing_1b_action:
    interview_order_motion_to_amend

  nav.set_section("packet_options")
  include_financial_statement

  interview_order_divorcejointpetition

  nav.set_section("court_requests")
  trial_court
  set_trial_court_division

  include_care_or_custody_affidavit = children_of_marriage
  if include_care_or_custody_affidavit:
    set_care_or_custody_affidavit_defaults
    nav.set_section("care_or_custody_affidavit_children")
    interview_order_affidavit_disclosing_care_or_custody_children
    nav.set_section("care_or_custody_affidavit_cases")
    interview_order_affidavit_disclosing_care_or_custody_cases
    nav.set_section("care_or_custody_affidavit_addresses")
    interview_order_affidavit_disclosing_care_or_custody_addresses
    trigger_aff_care_or_custody_computed_variables

  include_child_support_guidelines_worksheet = children_of_marriage
  include_findings_and_determinations = children_of_marriage
  if include_child_support_guidelines_worksheet:
    set_child_support_guidelines_defaults
    nav.set_section("child_support_guidelines")
    ma_child_support_guidelines_worksheet_intro
    interview_order_ma_child_support_guidelines_worksheet
    set_child_support_defaults_from_guidelines
    child_support_guidelines_result_reviewed

  include_separation_agreement = separation_agreement_format == "interview"

  if include_financial_statement:
    nav.set_section("financial_statement")
    financial_statement_court_division = trial_court.division
    interview_order_financial_statement

  if include_separation_agreement:
    interview_order_a_divorce_agreement

  if include_findings_and_determinations:
    set_findings_and_determinations_defaults
    nav.set_section("child_support_findings")
    cjd_305_intro
    interview_order_cjd_305

  nav.set_section("fee_waiver")
  set_indigency_defaults
  ask_if_qualifies_for_fee_waiver
  if ask_if_qualifies_for_fee_waiver:
    ask_affidavit_questions

  joint_petition_interview_order = True
