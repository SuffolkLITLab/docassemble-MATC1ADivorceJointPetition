id: Divorce type
question: |
 Joint petition for divorce under [G.L. c. 208, § 1 A](https://malegislature.gov/Laws/GeneralLaws/PartII/TitleIII/Chapter208/Section1a)
subquestion: | 
  In Massachusetts, a divorce can be filed as *no-fault* or *fault*, and can be *contested* or *uncontested*.

  A joint petition for divorce, informally called a "1A," is an *uncontested no-fault* divorce filed when: 
  
  * the parties agree they want a divorce; and 
  * the parties agree or want to work together on how to resolve the major issues in the divorce. 
  
  Do **both** ${  users[0].name_full()  } and ${  users[1].name_full()  } **agree** that you want to:
fields:
  - "Get divorced": divorce_affirm
    datatype: yesnoradio
  - "File together (jointly)": joint_petition_affirm
    datatype: yesnoradio
    show if: divorce_affirm
  - "File a complete, notarized separation agreement at the time of filing or within 90 days thereafter": notarize_affirm
    datatype: yesnoradio
    show if: joint_petition_affirm 
under: |
 [**Which type of divorce should I file?**](https://www.mass.gov/decision-tree/which-type-of-divorce-should-i-file)
---
id: Cautionary message divorce type 
question: |
  Confirm divorce type:
  Joint petition for divorce under [G.L. c. 208, § 1 A](https://malegislature.gov/Laws/GeneralLaws/PartII/TitleIII/Chapter208/Section1a)
subquestion: |
  A joint uncontested (1A) divorce petition is one of several different types of divorce in Massachusetts.
  
  You may file for a 1A divorce when both spouses **agree** the marriage has irretrievably broken down and cannot continue.

  When you file for divorce under Section 1A you must file a complete, notarized separation agreement at the time of filing or within 90 days thereafter. You are highly encouraged to file the separation agreement when you file.  
  
  In Massachusetts, a divorce can be filed as “no-fault” or “fault,” and can be contested or uncontested. 

