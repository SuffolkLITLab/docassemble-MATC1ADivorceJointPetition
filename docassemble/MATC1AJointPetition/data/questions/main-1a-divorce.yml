id: merger survival
question: | 
  Merger or survival of separation agreement
subquestion: | 
  A separation agreement that **survives** the divorce is a binding agreement between divorcing spouses that the probate and family court will not revisit or modify in the future. 

  A separation agreement that **merges** with the divorce is not a separate contract. If the judge approves the agreement, it becomes part of the divorce judgement. The divorce judgement can be revisited or modified in the future. 

  Any portion of a separation agreement related to the care and custody of minor children (e.g. child custody, visitation, and child support) will always merge. 

  **Do you want your separation agreement to merge, survive, or {both}?**
  
fields:
  - "Request merge agreement": request_merge_agreement
    datatype: yesnoradio
    required: False
  - "Request survive agreement": request_survive_agreement
    datatype: yesnoradio
    required: False  
