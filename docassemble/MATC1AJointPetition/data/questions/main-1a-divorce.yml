id: Agreement on major issues
question: | 
  Agreement on major issues
subquestion: |
  You will need to explain to the court how you will handle any issues related to your divorce. 
  These issues may include:
  
  
  * Child support
  * Parenting time
  * Child custody
  * Alimony
  * Dividing shared property (marital assets)
  * Health insurance 
  
  **Do ${  users[0].name_full()  } and ${  users[1].name_full()  } agree on how to resolve all major issues, such as property division, child custody, and child support?**
fields: 
  - "We agree on the major issues": separation_agreement_reached
    datatype: yesnoradio
---
id: Willing to negotiate agreement
question: |
  Willingness to negotiate agreement
subquestion: |
  Are ${  users[0].name_full()  } and ${  users[1].name_full()  } willing to work together to come to agreement on how you will handle any issues related to your divorce? 

  These issues may include:
  
  * Child support
  * Parenting time
  * Child custody
  * Alimony
  * Dividing shared property (marital assets)
  * Health insurance 

    There are different ways to reach an agreement. Some negotiate on their own while others hire lawyers. Some use mediators to help settle the issues. 
  
  [Alternative Dispute Resolution](https://www.mass.gov/alternative-dispute-resolution) options may be available. 
  
fields: 
  - "We will work together to come to agreement": parties_will_negotiate
    datatype: yesnoradio
under: |  
  You may prepare an agreement later in the interview if the parties are willing to work together to come to agreement. 
