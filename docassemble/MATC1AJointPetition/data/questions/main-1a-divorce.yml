---
terms:
  separation agreement: |
    A written document listing all things the parties agree on in their divorce, like child support, taxes, parenting time, and property division
  notary: |
    A notary or notary is authorized by the Commonwealth of Massachusetts to witnes signatures, among other possible duties. 
  notarize: |
    The process where a notary public witnesses signatures and places a seal on document to ensure authenticity
  notarized: |
    A document that has been signed in the presence of a notary public and the notary has placed their seal upon it
  children of the marriage: |
    Children of the marriage includes all children over whom the couple shares legal custody. This typically includes all children born to either spouse during the marriage and any other children legally adopted by one or both parents but not include step-children born or adopted to one spouse outside of the marriage and not legally adopted by the second spouse.
  child support guidelines: |
    Mathematical formula used by the court to determine an appropriate amount of child support  
  marital home: |
   The last residential address shared by divorcing parties
  financial statement: |
    A form summarizing a party's estimated income and expenses, assets, liabilities, and health insurance, etc. 
  divorce absolute: |
    The date a divorce becomes final
  both: |
    Some items or provisions will merge while others will survive. The separation agreement should clearly indicate which provisions will merge and which will survive. 
