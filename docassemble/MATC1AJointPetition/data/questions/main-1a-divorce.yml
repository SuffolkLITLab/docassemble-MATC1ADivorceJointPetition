  short title: >-
    Joint1ADivorce
  description: |-
    This interview helps married people in Massachusetts jointly ask the court for a no-fault divorce.
  can_I_use_this_form: |
    If you are a married person in Massachusetts, you can use this interview (with your spouse) to jointly ask the court for a no-fault divorce.
  before_you_start: |
    This interview will help you jointly ask the court for a no-fault divorce.
    
    Before you get started, please gather:
    
    1. Certified Copy of Marriage Certificate
    2. Notarized Separation Agreement (if already prepared) 
    3. Names, birthdays, and addresses for both parties and all minor children of the marriage
    4. Monthly budget or finance tracking information
    5. Recent pay stubs 
    
    When you are finished, you will need to:
    
    1. File Notarized Separation Agreement (unless complete) 
    2. File Certified Copy of Marriage Certificate (unless complete) 
    3. File financial statements for each petitioner
    4. If child support is being addressed or waived:
      a. child support guidelines worksheet (CJD 304)
      b. findings and determinations for child support and post-secondary education (CJD 305)
  when_you_are_finished: |
    File any remaining paperwork with the court registry and you will receive a notice with next steps from the court in the mail. You can also check the status of your case at [masscourts.org](https://www.masscourts.org)
