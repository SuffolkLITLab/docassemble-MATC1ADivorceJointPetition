#################### Interview order #####################
comment: |
  Controls order and branching logic for questions specific to this form
id: interview_order_divorcejointpetition
code: |
  # Set the allowed courts for this interview
  allowed_courts = ['Probate and Family Court']
  user_role = "plaintiff"
  user_ask_role = "plaintiff"
  
  nav.set_section("divorce_eligibility")
  legal_marriage
  if legal_marriage == False: 
    cautionary_message_divorce
  
  marriage_certificate_upload
  
  massachusetts_residency
  if massachusetts_residency == False:
    couple_ever_lived_in_massachusetts
    if couple_ever_lived_in_massachusetts == False: 
      cautionary_message_jurisdiction
    elif breakdown_in_massachusetts == False: 
      cautionary_message_jurisdiction
  
  divorce_affirm
  if divorce_affirm == False:
    cautionary_message_divorce_type
  elif joint_petition_affirm == False:
    cautionary_message_divorce_type
  elif notarize_affirm == False:
    cautionary_message_divorce_type

  nav.set_section("separation_agreement")
  separation_agreement_reached
  if separation_agreement_reached == True:
    separation_agreement_documented
  elif separation_agreement_reached == False:
    parties_will_negotiate
    if parties_will_negotiate == False:
      cautionary_message_divorce_type
  separation_agreement_format
  if separation_agreement_format == "wait":
    cautionary_message_delay_agreement
  elif separation_agreement_format == "upload":
    separation_agreement_upload
  
  nav.set_section("relationship_background")
  marriage_date
  set_marriage_location
  
  previous_action
  if previous_action == True:
    previous_action_detail

  live_together
  marital_home.zip
  copy_marital_address_fields
  
  nav.set_section("party_information") 
  users[0].birthdate
  users[0].gender_male
  users[0].gender_female
  users[0].address.address
  users[0].phone_number
  
  users[1].birthdate
  users[1].gender_male
  users[1].gender_female
  users[1].address.address
  users[1].phone_number

  users.gather()
  set_parts(subtitle=str(users))
  
  nav.set_section("children_information")
  children_of_marriage
  if children_of_marriage:
    children_of_marriage_number
    children.gather()
    set_parts(subtitle=str(children))
    users1_number_of_custodial_children
  nav.set_section("court_requests")  
  request_merge_agreement
  users[0].name_change
  additional_request
  
  set_progress(80)
 
  nav.set_section("additional_circumstances_and_filings")


  set_progress(90)
  nav.set_section("review_and_sign")

  set_default_petition_values
  
  interview_order_divorcejointpetition = True
